# Hue overrides for Lab 8 — a browser-based SQL editor over HiveServer2.
# Mounted as z-hue.ini so it sorts after the image's default hue.ini and wins.
# Queries you run here become YARN jobs — watch them at the ResourceManager UI (:8088).

[desktop]
  http_host=0.0.0.0
  http_port=8888
  app_blacklist=impala,hbase,solr,oozie,pig,sqoop,zookeeper,spark,security,jobsub
  [[database]]
    # Hue's own metadata DB. It MUST be a transactional RDBMS — the default embedded
    # SQLite throws "You can't execute queries until the end of the 'atomic' block".
    engine=postgresql_psycopg2
    host=hue-postgres
    port=5432
    user=hue
    password=hue
    name=hue

[notebook]
  [[interpreters]]
    [[[hive]]]
      name=Hive
      interface=hiveserver2

[beeswax]
  hive_server_host=hive-server
  hive_server_port=10000
  thrift_version=7

[hadoop]
  [[hdfs_clusters]]
    [[[default]]]
      fs_defaultfs=hdfs://namenode:9000
      webhdfs_url=http://namenode:9870/webhdfs/v1
  [[yarn_clusters]]
    [[[default]]]
      # Lets Hue reach YARN (the queries here run as YARN jobs).
      resourcemanager_host=resourcemanager
      resourcemanager_port=8032
      resourcemanager_api_url=http://resourcemanager:8088
