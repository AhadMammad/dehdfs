# Lab 4 — NameNode metadata: 1 NameNode + 1 DataNode.
# The focus is the NameNode's on-disk metadata (fsimage + edit log) and checkpointing,
# so a single DataNode is enough to hold the tiny amount of block data we write.

name: dehdfs-lab4

services:
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: dehdfs-lab4-namenode
    hostname: namenode
    environment:
      - CLUSTER_NAME=dehdfs-lab4
    env_file:
      - ./hadoop.env
    ports:
      - "9870:9870"
      - "9000:9000"
    volumes:
      - namenode:/hadoop/dfs/name

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: dehdfs-lab4-datanode
    hostname: datanode
    depends_on:
      - namenode
    environment:
      - SERVICE_PRECONDITION=namenode:9870
    env_file:
      - ./hadoop.env
    volumes:
      - datanode:/hadoop/dfs/data

volumes:
  namenode:
  datanode:
