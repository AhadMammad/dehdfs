# Lab 18 — Spark SQL over the Hive metastore: HDFS + metastore + HiveServer2 + Spark.

name: dehdfs-lab18

services:
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: dehdfs-lab18-namenode
    hostname: namenode
    environment:
      - CLUSTER_NAME=dehdfs-lab18
    env_file:
      - ./hadoop.env
    ports:
      - "9870:9870"
      - "9000:9000"
    volumes:
      - namenode:/hadoop/dfs/name

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: dehdfs-lab18-datanode
    hostname: datanode
    depends_on:
      - namenode
    environment:
      - SERVICE_PRECONDITION=namenode:9870
    env_file:
      - ./hadoop.env
    ports:
      - "9864:9864"
    volumes:
      - datanode:/hadoop/dfs/data

  hive-metastore-postgresql:
    image: bde2020/hive-metastore-postgresql:2.3.0
    container_name: dehdfs-lab18-metastore-db
    hostname: hive-metastore-postgresql
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/5432' 2>/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s
    volumes:
      - metastore_db:/var/lib/postgresql/data

  hive-metastore:
    image: bde2020/hive:2.3.2-postgresql-metastore
    container_name: dehdfs-lab18-hive-metastore
    hostname: hive-metastore
    command: /opt/hive/bin/hive --service metastore
    depends_on:
      - namenode
      - datanode
      - hive-metastore-postgresql
    environment:
      - SERVICE_PRECONDITION=namenode:9870 datanode:9864 hive-metastore-postgresql:5432
    env_file:
      - ./hadoop.env
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/9083' 2>/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 40
      start_period: 20s

  hive-server:
    image: bde2020/hive:2.3.2-postgresql-metastore
    container_name: dehdfs-lab18-hive-server
    hostname: hive-server
    depends_on:
      - hive-metastore
    environment:
      - SERVICE_PRECONDITION=hive-metastore:9083
    env_file:
      - ./hadoop.env
    ports:
      - "10000:10000"
      - "10002:10002"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/10000' 2>/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 40
      start_period: 30s

  spark:
    image: apache/spark:3.3.2
    container_name: dehdfs-lab18-spark
    hostname: spark
    depends_on:
      hive-metastore:
        condition: service_healthy
      namenode:
        condition: service_healthy
    # Keep the container alive; we run queries with `spark-sql` via exec.
    entrypoint: ["/bin/bash", "-c", "tail -f /dev/null"]
    volumes:
      - ./config/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "test -x /opt/spark/bin/spark-sql || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s

volumes:
  namenode:
  datanode:
  metastore_db:
